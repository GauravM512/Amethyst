name: iOS TestFlight

on:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-ios-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-ios-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler: "2.5"
          bundler-cache: false
          working-directory: iosApp

      - name: Install gems
        working-directory: iosApp
        run: bundle install

      - name: Prepare ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          echo "$ASC_API_KEY_CONTENT" > /tmp/asc_key_raw.p8
          # Re-encode using openssl pkey (uses OpenSSL::PKey.read internally)
          # which correctly handles the prime256v1 curve name on OpenSSL 3.x
          openssl pkey -in /tmp/asc_key_raw.p8 -out /tmp/asc_key.p8
          rm /tmp/asc_key_raw.p8

      - name: Set up SSH key for Match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Run Fastlane beta lane
        working-directory: iosApp
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_FILEPATH: /tmp/asc_key.p8
          MATCH_PASSWORD: ""
          BUILD_NUMBER: ${{ github.run_number }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: bundle exec fastlane beta
