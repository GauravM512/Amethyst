name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.5.0)'
        required: true
        type: string
      release_name:
        description: 'Release title (optional, defaults to "Amethyst v<version>")'
        required: false
        type: string
      release_notes:
        description: 'Release notes / changelog (optional)'
        required: false
        type: string

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ML Graphics
        uses: actions/checkout@v4
        with:
          repository: anthonyhfm/ml3-graphics-amethyst
          token: ${{ secrets.ML_GRAPHICS_TOKEN }}
          path: ml3-graphics
          sparse-checkout: devices

      - name: Copy ML Graphics
        shell: bash
        run: mkdir -p composeApp/src/commonMain/composeResources/files && cp -r ml3-graphics/. composeApp/src/commonMain/composeResources/files/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-windows-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-windows-

      - name: Build NSIS
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:packageReleaseNsis

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-windows
          path: composeApp/build/compose/binaries/main-release/nsis/*.exe
          if-no-files-found: error

  build-macos-arm:
    name: Build (macOS Apple Silicon)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ML Graphics
        uses: actions/checkout@v4
        with:
          repository: anthonyhfm/ml3-graphics-amethyst
          token: ${{ secrets.ML_GRAPHICS_TOKEN }}
          path: ml3-graphics
          sparse-checkout: devices

      - name: Copy ML Graphics
        run: mkdir -p composeApp/src/commonMain/composeResources/files && cp -r ml3-graphics/. composeApp/src/commonMain/composeResources/files/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-macos-arm-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-macos-arm-

      - name: Build DMG
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:packageReleaseDmg

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-macos-arm
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg
          if-no-files-found: error

  build-macos-intel:
    name: Build (macOS Intel)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ML Graphics
        uses: actions/checkout@v4
        with:
          repository: anthonyhfm/ml3-graphics-amethyst
          token: ${{ secrets.ML_GRAPHICS_TOKEN }}
          path: ml3-graphics
          sparse-checkout: devices

      - name: Copy ML Graphics
        run: mkdir -p composeApp/src/commonMain/composeResources/files && cp -r ml3-graphics/. composeApp/src/commonMain/composeResources/files/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-macos-intel-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-macos-intel-

      - name: Build DMG
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:packageReleaseDmg

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-macos-intel
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg
          if-no-files-found: error

  build-linux-deb:
    name: Build (Linux DEB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ML Graphics
        uses: actions/checkout@v4
        with:
          repository: anthonyhfm/ml3-graphics-amethyst
          token: ${{ secrets.ML_GRAPHICS_TOKEN }}
          path: ml3-graphics
          sparse-checkout: devices

      - name: Copy ML Graphics
        run: mkdir -p composeApp/src/commonMain/composeResources/files && cp -r ml3-graphics/. composeApp/src/commonMain/composeResources/files/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-linux-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-linux-

      - name: Build DEB
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:packageReleaseDeb

      - name: Upload Linux DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-linux-deb
          path: composeApp/build/compose/binaries/main-release/deb/*.deb
          if-no-files-found: error

  build-linux-appimage:
    name: Build (Linux AppImage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ML Graphics
        uses: actions/checkout@v4
        with:
          repository: anthonyhfm/ml3-graphics-amethyst
          token: ${{ secrets.ML_GRAPHICS_TOKEN }}
          path: ml3-graphics
          sparse-checkout: devices

      - name: Copy ML Graphics
        run: mkdir -p composeApp/src/commonMain/composeResources/files && cp -r ml3-graphics/. composeApp/src/commonMain/composeResources/files/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-linux-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-linux-

      - name: Build AppImage
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:packageReleaseAppImage

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-linux-appimage
          path: composeApp/build/compose/binaries/main-release/app/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-windows, build-macos-arm, build-macos-intel, build-linux-deb, build-linux-appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.release_name || format('Amethyst v{0}', inputs.version) }}
          body: |
            ${{ inputs.release_notes }}

            **Build #${{ github.run_number }}** · Commit: `${{ github.sha }}` · @${{ github.actor }}
          files: |
            release-artifacts/amethyst-windows/*.exe
            release-artifacts/amethyst-macos-arm/*.dmg
            release-artifacts/amethyst-macos-intel/*.dmg
            release-artifacts/amethyst-linux-deb/*.deb
            release-artifacts/amethyst-linux-appimage/*
          fail_on_unmatched_files: true
